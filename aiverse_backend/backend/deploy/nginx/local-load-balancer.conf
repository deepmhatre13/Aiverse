worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Upstream application pool (two local Django instances)
    upstream aiverse_backend_pool {
        least_conn;
        server 127.0.0.1:8000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8001 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 8088;
        server_name localhost;

        client_max_body_size 50m;

        # Health probe endpoint for local LB checks
        location = /healthz {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://aiverse_backend_pool/api/health/;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_pass http://aiverse_backend_pool;
        }

        # WebSocket support for Channels endpoints
        location /ws/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_pass http://aiverse_backend_pool;
        }
    }
}
